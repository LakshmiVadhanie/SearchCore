version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: searchcore
      POSTGRES_PASSWORD: searchcore
      POSTGRES_DB: searchcore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchcore -d searchcore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
